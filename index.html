  <script>
        const pernyataan = [
            "Saya memiliki kelemahan dalam melakukan beberapa hal.",
            "Tidak masalah bila saya gagal sebab itu kesempatan untuk belajar.",
            "Jika orang lain melakukan sesuatu yang lebih baik daripada saya, itu akan menyebabkan saya merasa rendah diri.",
            "Saya suka mencoba hal-hal yang baru meskipun hal ini memiliki resiko.",
            "Saya merasa sukses pada saat mampu menunjukkan kepada orang lain bahwa saya mahir dalam suatu bidang.",
            "Ketika orang lain sukses, saya merasa terinspirasi dan ingin melakukan hal yang sama.",
            "Saya senang saat mampu melakukan sesuatu yang tidak bisa dilakukan orang lain.",
            "Tingkat kecerdasan bisa diubah lewat belajar dan berlatih.",
            "Menurut pendapat saya, manusia dilahirkan dengan tingkat kecerdasan tertentu yang tidak bisa diubah lagi.",
            "Kesulitan membuat saya ingin berusaha lebih keras lagi."
        ];

        const container = document.getElementById('questions-container');
        pernyataan.forEach((p, i) => {
            const no = i + 1;
            const div = document.createElement('div');
            div.className = 'flex items-start gap-3 p-3 rounded-lg bg-white border border-gray-100 shadow-sm';
            div.innerHTML = `
                <span class="font-bold text-gray-500 mt-0.5 min-w-[24px]">${no}.</span>
                <div class="flex-1">
                    <p class="text-gray-800 mb-2">${p}</p>
                    <div class="flex gap-3">
                        <label class="radio-btn cursor-pointer"><input type="radio" name="q${no}" value="S" required class="hidden"><span class="inline-block px-4 py-1 rounded-full border-2 border-green-300 text-sm font-medium transition">Setuju</span></label>
                        <label class="radio-btn-red cursor-pointer"><input type="radio" name="q${no}" value="T" required class="hidden"><span class="inline-block px-4 py-1 rounded-full border-2 border-red-300 text-sm font-medium transition">Tidak Setuju</span></label>
                    </div>
                </div>
            `;
            container.appendChild(div);
        });

        let allData = [];

        const dataHandler = {
            onDataChanged(data) {
                allData = data;
                renderHistory(data);
            }
        };

        function renderHistory(data) {
            const tbody = document.getElementById('history-body');
            const empty = document.getElementById('empty-history');
            if (data.length === 0) { tbody.innerHTML = ''; empty.classList.remove('hidden'); return; }
            empty.classList.add('hidden');

            const existing = new Map([...tbody.children].map(r => [r.dataset.id, r]));
            const sorted = [...data].sort((a, b) => (b.tanggal || '').localeCompare(a.tanggal || ''));

            sorted.forEach(row => {
                const id = row.__backendId;
                if (existing.has(id)) {
                    const tr = existing.get(id);
                    tr.cells[0].textContent = row.nama;
                    tr.cells[1].textContent = row.kelas;
                    tr.cells[2].textContent = row.skor_ganjil;
                    tr.cells[3].textContent = row.skor_genap;
                    tr.cells[4].textContent = row.profil;
                    tr.cells[5].textContent = new Date(row.tanggal).toLocaleDateString('id-ID');
                    existing.delete(id);
                } else {
                    const tr = document.createElement('tr');
                    tr.dataset.id = id;
                    tr.className = 'border-t border-gray-100';
                    tr.innerHTML = `<td class="px-3 py-2">${row.nama}</td><td class="px-3 py-2">${row.kelas}</td><td class="px-3 py-2 text-center">${row.skor_ganjil}</td><td class="px-3 py-2 text-center">${row.skor_genap}</td><td class="px-3 py-2 font-semibold">${row.profil}</td><td class="px-3 py-2">${new Date(row.tanggal).toLocaleDateString('id-ID')}</td><td class="px-3 py-2"><button class="text-red-500 hover:text-red-700 text-xs" onclick="deleteRow('${id}')">Hapus</button></td>`;
                    tbody.appendChild(tr);
                }
            });
            existing.forEach(tr => tr.remove());
        }

        async function deleteRow(id) {
            const row = allData.find(r => r.__backendId === id);
            if (!row) return;
            const result = await window.dataSdk.delete(row);
            if (!result.isOk) { console.error(result.error); }
        }

        document.getElementById('survey-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (allData.length >= 999) { document.getElementById('limit-warning').classList.remove('hidden'); return; }

            const nama = document.getElementById('nama').value.trim();
            const kelas = document.getElementById('kelas').value.trim();
            const answers = [];
            let A = 0, B = 0;

            for (let i = 1; i <= 10; i++) {
                const val = document.querySelector(`input[name="q${i}"]:checked`).value;
                answers.push(val);
                if (i % 2 === 1 && val === 'S') A++;
                if (i % 2 === 0 && val === 'S') B++;
            }

            let profil = 'Campuran';
            if (A > B) profil = 'Pola Pikir Tetap (PPT)';
            else if (A < B) profil = 'Pola Pikir Bertumbuh (PPB)';

            const btn = document.querySelector('[data-template-id="submit-btn"]');
            btn.disabled = true; btn.style.opacity = '0.5';

            const result = await window.dataSdk.create({
                nama, kelas, jawaban: answers.join(','),
                skor_ganjil: A, skor_genap: B, profil, tanggal: new Date().toISOString()
            });

            btn.disabled = false; btn.style.opacity = '1';

            if (result.isOk) {
                const box = document.getElementById('result-box');
                box.classList.remove('hidden');
                document.getElementById('result-text').textContent = profil;
                document.getElementById('result-detail').textContent = `Skor Ganjil (A): ${A} | Skor Genap (B): ${B}`;
                box.style.background = A > B ? '#fef2f2' : A < B ? '#f0fdf4' : '#fefce8';
                e.target.reset();
            }
        });

        (async () => {
            await window.dataSdk.init(dataHandler);
            lucide.createIcons();
        })();
    </script>
